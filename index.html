<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Reader</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'EB Garamond', serif;
  background: #f5f1e8;
  color: #1a1a1a;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 700px;
  padding: 40px 20px;
  line-height: 1.8;
  font-size: 20px;
}

.menu {
  position: fixed;
  top: 10px;
  right: 10px;
}

button {
  padding: 8px 12px;
  margin: 2px;
  border: none;
  cursor: pointer;
}

.dark {
  background: #0e0e10;
  color: #e0e0e0;
}

.purple {
  background: #2c1b3a;
  color: #e8ddf2;
}

.red {
  background: #3a0f14;
  color: #f2d8da;
}
</style>
</head>

<body>

<div class="menu">
  <button onclick="setTheme('default')">☀️</button>
  <button onclick="setTheme('dark')">🌙</button>
  <button onclick="setTheme('purple')">🟣</button>
  <button onclick="setTheme('red')">🔴</button>
</div>

<div class="container" id="text">

<h1>Фридрих Ницше</h1>

<p>
Кто с чудовищами борется, тому следует остерегаться,
чтобы самому не стать чудовищем.
</p>

<p>
И если ты долго смотришь в бездну, то бездна тоже смотрит в тебя.
</p>

</div>

<script>
function setTheme(theme) {
  document.body.className = theme;
}
</script>

</body>
</html>
